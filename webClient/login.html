<!DOCTYPE html>

    </head>
    
    
    <body id="loginBody">
        <!---------------------------------------------- HTML -------------------------------------------------->
        <div id="welcome">
            <h1>Welcome</h1>

        </div>

            <p>Enter your username : </p>

            <br>

            <p id="createAccount">Don't have an account :</p>
            <a href="./createAccount.html">Sign in</a>
        </div>
