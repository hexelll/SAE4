<!DOCTYPE html>
<html>


    <head>
        <title>Playing!</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="./style.css" type="text/css" rel="stylesheet"/>
    </head>
    
    
    <body>
        <!---------------------------------------------- HTML -------------------------------------------------->
        <h1>Welcome to the play</h1>
        <p>You are actually playing</p>


        <!---------- Me ----------->
        <div id="me">
            <div>
                <p>Player 2 : Kimi</p>
                <p id="nbCardsMe"></p>
            </div>
            
            <div id="myHand">
            </div>
        </div>


        <!--------- Darw Pile ---------->
        <div id="assets">
            <div id="playedPile"></div>
            <button id="drawPile"> Pioche </button>
        </div>



        <!----------- Enemy ------------>
        <div id="enemyTop">
            <!-- So that the info of a player are on a line and not on columns -->
            <div>
                <p>Player 1 : Luc </p>
                <p id="nbCardsEnenyTop"></p>
            </div>

            <div id="enemyTopHand"></div>
        </div>

        <div id="enemyLeft">
            <!-- So that the info of a player are on a line and not on columns -->
            <div>
                <p>Player 3 : Théo </p>
                <p id="nbCardsEnemyLeft"></p>
                <p id="nbCardsLeft"></p>
            </div>

            <div id="enemyLeftHand">
            </div>
        </div>

        <div id="enemyRight">
            <!-- So that the info of a player are on a line and not on columns -->
            <div>
                <p>Player 4 : Alex </p>
                <p id="nbCardsEnenyRight"></p>
            </div>

            <div id="enemyRightHand">
            </div>
        </div>
        





        <!---------------------------------------------- LIBRARIES -------------------------------------------------->
        <!-- React and React DOM -->
        <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"> </script>
        <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"> </script>


        


        <!--------------------------------------------- SCRIPT REACT ------------------------------------------------>
        <script>  
    

        /* ------------------------------------------- ACTUAL PLAYER -------------------------------------------------*/
            // Creating obj json ti create fake card wating for the server   
            var cards = [
                { value: 1, color: "red" },
                { value: 5, color: "blue" },
                { value: 9, color: "green" },
                { value: "+ 4", color: "black" },
            ];
            // Get the number of cards and print it
            var nbCardsMe = $("#nbCardsMe");
            nbCardsMe.html("Number of cards : " + cards.length);


            // Create the root w/ the DOM
            const myRoot = ReactDOM.createRoot(document.getElementById("myHand"));

            // Create the cards (print)
            function makeCards() {
                var myCards = cards.map((card, index) =>
                    React.createElement("div", {
                        key: index,
                        className: "cardInnerWhite",
                        onClick: () => play(card, index)
                    },
                        React.createElement("div", {
                            className: "cardInnerColor",
                            style: {
                                backgroundColor: card.color,
                                Index: index
                            }
                        }, card.value)
                    )    
                );
                myRoot.render(myCards);
                console.log(myCards);
            }

            
            

        /* --------------------------------------------- ENEMIES -------------------------------------------------*/
            /* ---------------------------------- Enemy's top hand -----------------------------------*/
            // Get the number of cards and print it
            var nbCardsEnemyTop = 2; // Gotten form server request
            $("#nbCardsEnenyTop").html("Number of cards : " + nbCardsEnemyTop);


            // Create the root w/ the DOM
            const enemyTopRoot = ReactDOM.createRoot(document.getElementById("enemyTopHand"));

            // Create the cards (print) 
            // Different than for the actual player : because we don't know the cards the enemy has, only how many
            function makeTopEnemysCards() {
                var enemyTopCards = [];
                for (i = 0; i < nbCardsEnemyTop; i ++) {
                    enemyTopCards.push(React.createElement("div", {
                        key: i,
                        className: "enemyCard",
                        style: {
                            marginLeft: i === 0 ? "0px" : "-50px",
                            zIndex: i
                        }
                    })
                    )
                }
                    
                enemyTopRoot.render(enemyTopCards);
            }



            /* ---------------------------------- Left enemy's hand -----------------------------------*/
            // Get the number of cards and print it
            var nbCardsEnemyLeft = 16; // Gotten form server request
            $("#nbCardsEnemyLeft").html("Number of cards : " + nbCardsEnemyLeft);


            // Create the root w/ the DOM
            const enemyLeftRoot = ReactDOM.createRoot(document.getElementById("enemyLeftHand"));

            // Create the cards (print) 
            // Different than for the actual player : because we don't know the cards the enemy has, only how many
            function makeLeftEnemysCards() {
                var enemyLeftCards = [];
                var overlap;

                /* If there is to much card to print */
                if(nbCardsEnemyLeft > 10) { 
                    nbCardsLeftVisible = 10; /* How much card to print */
                    nbCardLeftRemaining = nbCardsEnemyLeft - 10; /* How much card left to print */
                    $("#nbCardsLeft").html(nbCardLeftRemaining);
                
                    for (i = 0; i < nbCardsLeftVisible-1; i ++) {
                        enemyLeftCards.push(React.createElement("div", {
                            key: i,
                            className: "enemyCard",
                            style: {
                                marginLeft: i === 0 ? "0px" : "-50px",
                                zIndex: i
                            }
                            })
                        )
                    }
                    
                    /* Print the 10th card with how much card the player has in more */
                    enemyLeftCards.push(React.createElement("div", {
                        key: (nbCardsLeftVisible-1),
                        className: "enemyCard",
                        style: {
                            marginLeft: (nbCardsLeftVisible-1) === 0 ? "0px" : "-50px",
                            zIndex: (nbCardsLeftVisible-1)
                        }
                        }, "+" + nbCardLeftRemaining)
                    )     
                    
                }
                enemyLeftRoot.render(enemyLeftCards);
            }



            /* ---------------------------------- Right enemy's hand -----------------------------------*/
            // Get the number of cards and print it
            var nbCardsEnemyRight = 7; // Gotten form server request
            $("#nbCardsEnenyRight").html("Number of cards : " + nbCardsEnemyRight);


            // Create the root w/ the DOM
            const enemyRightRoot = ReactDOM.createRoot(document.getElementById("enemyRightHand"));

            // Create the cards (print) 
            // Different than for the actual player : because we don't know the cards the enemy has, only how many
            function makeRightEnemysCards() {
                var enemyRightCards = [];
                for (j = 0; j < nbCardsEnemyRight; j ++) {
                    enemyRightCards.push(React.createElement("div", {
                        key: j,
                        className: "enemyCard",
                        style: {
                            marginLeft: j === 0 ? "0px" : "-50px",
                            zIndex: j
                        }
                    }) 
                    )
                }
                    
                enemyRightRoot.render(enemyRightCards);
            }






        /* --------------------------------------------- ACTIONS -------------------------------------------------*/ 
            /* Create new tab from tab cards w/ function filter, the value inside the new tab are the one not played */
            function play(card, indexToRemove) {
                /* Create new tab from tab cards w/ function filter, the value inside the new tab are the one not played */
                cards = cards.filter((card, index) => index !== indexToRemove); 

                $("#playedPile").html("Played : " + card.value + " " + card.color);
                console.log("test play");
                makeCards();
            }
    

            function draw() {
                var colors = ["red", "blue", "green", "yellow"];
                var values = [1, 2, 3, 4 , 5, 6, 7, 8, 9, "+2", "change"];
                var randomColor = Math.floor(Math.random() * colors.length);
                var randomValue = Math.floor(Math.random() * values.length);
                console.log("Random color : " + colors[randomColor]);
                console.log("Random value : " + values[randomValue]);
                
                var newCard = { value: values[randomValue], color: colors[randomColor] };
                cards.push(newCard);

                console.log("test draw", cards);
                makeCards(); 
            }
             

            makeTopEnemysCards();
            makeLeftEnemysCards();
            //makeRightEnemysCards();
            makeCards();
            $("#drawPile").click(draw);
            
    
        
        </script>


    </body>



</html>
